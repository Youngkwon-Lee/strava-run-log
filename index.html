<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>strava-run-log</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ed;
        color: #17201b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 40px));
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: #4b5650;
        line-height: 1.6;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      a {
        display: block;
        padding: 14px 16px;
        border: 1px solid #d7d0c3;
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
        background: #fffaf1;
      }

      a:hover {
        border-color: #a99b83;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 14px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111614;
          color: #edf2ee;
        }

        p {
          color: #aeb8b1;
        }

        a {
          background: #19201d;
          border-color: #2f3833;
        }

        a:hover {
          border-color: #66736b;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>strava-run-log</h1>
      <p>API service for Strava run reports, live coaching, and weekly activity summaries.</p>
      <ul>
        <li><a href="/api/strava/weekly-report"><code>GET /api/strava/weekly-report</code></a></li>
        <li><a href="/api/live/metrics"><code>POST /api/live/metrics</code></a></li>
        <li><a href="/api/strava/webhook"><code>GET/POST /api/strava/webhook</code></a></li>
      </ul>
    </main>
  </body>
</html>
